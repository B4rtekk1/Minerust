  name: Release

  on:
    push:

  permissions:
    contents: write

  jobs:
    build-windows:
      name: Build Windows Release

      runs-on: windows-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Rust (stable)
          uses: dtolnay/rust-toolchain@stable
          with:
            targets: x86_64-pc-windows-msvc

        - name: Cache Cargo dependencies
          uses: Swatinem/rust-cache@v2

        - name: Build release
          run: cargo build --release --target x86_64-pc-windows-msvc

        - name: Package ZIP
          shell: pwsh
          run: |
            $out = "render3d-windows"
            New-Item -ItemType Directory -Force -Path $out
  
            # Copy exe
            Copy-Item "target\x86_64-pc-windows-msvc\release\render3d.exe" "$out\"
  
            # Copy assets
            Copy-Item -Recurse "assets" "$out\"
  
            # Create ZIP archive
            Compress-Archive -Path "$out\*" -DestinationPath "render3d-windows.zip" -Force

        - name: Create GitHub Release and upload files
          if: startsWith(github.ref, 'refs/tags/')
          uses: softprops/action-gh-release@v2
          with:
            files: render3d-windows.zip
            generate_release_notes: true

